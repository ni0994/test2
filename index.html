<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>情報セキュリティ 学習アプリ</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#004080" />
</head>
<body>
  <header class="app-header">
    <h1>情報セキュリティ 学習アプリ</h1>
    <p class="app-subtitle">個人学習から社内研修までカバーする問題演習プラットフォーム</p>
  </header>

  <main class="app-main">

    <!-- 検索 -->
    <section class="search-panel">
      <input id="search-input" type="text" placeholder="検索（問題文 / 選択肢 / 解説 / タグ）" />
      <button id="search-button" type="button">検索</button>
      <span id="search-count" class="search-count"></span>
    </section>

    <!-- フィルタ -->
    <section class="mode-panel">
      <button id="filter-toggle" class="filter-toggle" type="button" aria-expanded="true">
        <span>🔽 フィルタ・設定</span>
      </button>
      <div id="filter-body" class="filter-body">
        <div class="mode-row">
          <label for="pool-select">出題対象:</label>
          <select id="pool-select">
            <option value="all">全て</option>
            <option value="unanswered">未回答のみ</option>
            <option value="wrong">過去に不正解あり</option>
            <option value="never-correct">一度も正解したことがない</option>
            <option value="bookmarked">ブックマーク済み</option>
          </select>

          <label for="domain-select">分野:</label>
          <select id="domain-select">
            <option value="all">全分野</option>
          </select>

          <label for="difficulty-select">難易度:</label>
          <select id="difficulty-select">
            <option value="all">全難易度</option>
            <option value="basic">basic</option>
            <option value="standard">standard</option>
            <option value="hard">hard</option>
          </select>
        </div>

        <div class="mode-row mode-row--actions">
          <button id="random10" type="button">ランダム10問</button>

          <label class="toggle-label">
            <input id="shuffle-toggle" type="checkbox" checked />
            選択肢シャッフル
          </label>

          <button id="btn-clear-bookmarks" type="button" class="btn-ghost">🔖 ブックマーク全解除</button>
        </div>

        <div id="active-tag-area" class="active-tag-area hidden">
          <span class="active-tag-label">タグ絞り込み中:</span>
          <span id="active-tag-value" class="active-tag-chip"></span>
          <button id="btn-clear-tag" type="button" class="btn-ghost">✕ 解除</button>
        </div>
      </div>
    </section>

    <!-- ダッシュボード開閉ボタン -->
    <button id="toggle-stats" class="toggle-stats-button" type="button">
      📊 進捗・正答率を開く
    </button>

    <!-- ダッシュボード本体 -->
    <section id="stats-wrapper" class="stats-wrapper hidden">
      <section class="stats-panel">
        <h2>📊 進捗・正答率</h2>

        <!-- 全体サマリ + 円グラフ -->
        <div class="stats-top">
          <!-- 数値サマリ -->
          <div class="stats-top__numbers">
            <div class="stats-overall">
              <div>総問題数: <span id="overall-total">0</span></div>
              <div>回答済: <span id="overall-solved">0</span></div>
              <div>正解数: <span id="overall-correct">0</span></div>
              <div>正答率(%): <span id="overall-rate">0.0</span></div>
            </div>
            <!-- 全体プログレスバー -->
            <div class="stats-bar stats-bar--overall">
              <i id="overall-progress-bar"></i>
            </div>
          </div>

          <!-- 円グラフ -->
          <div class="stats-top__chart">
            <canvas id="overall-progress-pie"></canvas>
          </div>
        </div>

        <!-- 難易度別統計 -->
        <div class="stats-difficulty" id="stats-difficulty">
          <div class="stats-diff-row" data-diff="basic">
            <span class="diff-label">basic</span>
            <span class="diff-body">総: <b class="diff-total">0</b> 回答: <b class="diff-solved">0</b> 正答率: <b class="diff-rate">0.0</b>%</span>
            <div class="stats-bar"><i></i></div>
          </div>
          <div class="stats-diff-row" data-diff="standard">
            <span class="diff-label">standard</span>
            <span class="diff-body">総: <b class="diff-total">0</b> 回答: <b class="diff-solved">0</b> 正答率: <b class="diff-rate">0.0</b>%</span>
            <div class="stats-bar"><i></i></div>
          </div>
          <div class="stats-diff-row" data-diff="hard">
            <span class="diff-label">hard</span>
            <span class="diff-body">総: <b class="diff-total">0</b> 回答: <b class="diff-solved">0</b> 正答率: <b class="diff-rate">0.0</b>%</span>
            <div class="stats-bar"><i></i></div>
          </div>
        </div>

        <!-- 分野別統計（JS で動的生成） -->
        <div id="stats-domains" class="stats-domains"></div>
      </section>
    </section>

    <!-- 問題一覧 -->
    <section>
      <div id="questions-container"></div>
    </section>

  </main>

  <!-- トップへ戻るボタン -->
  <button id="back-to-top" class="back-to-top hidden" title="先頭へ戻る">▲</button>

  <!-- オフラインバナー -->
  <div id="offline-banner" class="offline-banner hidden">
    オフラインモードで動作中です（キャッシュされた問題のみ利用可）。
  </div>

  <!-- 隠し管理パネル（ヘッダー5回クリックで表示） -->
  <div id="admin-panel" class="admin-panel hidden">
    <div class="admin-panel__inner">
      <div class="admin-panel__title">🛠 管理メニュー</div>
      <p class="admin-panel__hint">※ ヘッダーを5回タップして開いています</p>
      <div class="admin-panel__actions">
        <button id="btn-clear-cache" class="admin-btn admin-btn--warn">
          🗑 キャッシュ削除
        </button>
        <button id="btn-reset-answers" class="admin-btn admin-btn--danger">
          ⚠️ 回答履歴を全消去
        </button>
        <button id="btn-reset-answers-only" class="admin-btn admin-btn--danger">
          ⚠️ 回答履歴のみ消去
        </button>
      </div>
      <button id="btn-admin-close" class="admin-btn admin-btn--close">閉じる</button>
    </div>
  </div>

  <!-- Chart.js（円グラフ用） -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "fuse.js": "https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.esm.js"
    }
  }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
